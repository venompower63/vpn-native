      // ==========================================
      // SPORT SOUND SYSTEM - Two audio files
      // ==========================================
      class SportSound {
        constructor() {
          this.audioCtx = null;
          this.welcomeBuffer = null;
          this.clickBuffer = null;
          this.welcomeLoaded = false;
          this.clickLoaded = false;
          
          // AMG welcome/startup sound
          this.welcomeUrl = "https://storage.yandexcloud.net/promto-user-static-sites-prod/design-assets/941619812/6bb7db79-ec84-41c7-b74f-db5bb596911a/652fb1be-d427-4c80-8a30-d5ea8267b45c-_.mp3";
          
          // Pistol shot for button clicks
          this.clickUrl = "https://storage.yandexcloud.net/promto-user-static-sites-prod/design-assets/941619812/6bb7db79-ec84-41c7-b74f-db5bb596911a/66a9fdb3-d6ca-4051-b26d-1d03813e97ff-short-single-pistol-shot.mp3";
        }

        // Load welcome/startup audio
        async loadWelcomeAudio() {
          if (this.welcomeLoaded) return;
          try {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const response = await fetch(this.welcomeUrl);
            const arrayBuffer = await response.arrayBuffer();
            this.welcomeBuffer = await this.audioCtx.decodeAudioData(arrayBuffer);
            this.welcomeLoaded = true;
          } catch (e) {
            console.log("Welcome audio load failed");
          }
        }

        // Load click audio
        async loadClickAudio() {
          if (this.clickLoaded) return;
          try {
            if (!this.audioCtx) {
              this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            const response = await fetch(this.clickUrl);
            const arrayBuffer = await response.arrayBuffer();
            this.clickBuffer = await this.audioCtx.decodeAudioData(arrayBuffer);
            this.clickLoaded = true;
          } catch (e) {
            console.log("Click audio load failed");
          }
        }

        // Play welcome/startup sound
        playWelcome() {
          if (!this.welcomeLoaded || !this.audioCtx || !this.welcomeBuffer) {
            const audio = new Audio(this.welcomeUrl);
            audio.volume = 1;
            audio.play().catch(() => {});
            return;
          }

          try {
            if (this.audioCtx.state === "suspended") {
              this.audioCtx.resume();
            }
            const source = this.audioCtx.createBufferSource();
            source.buffer = this.welcomeBuffer;
            source.connect(this.audioCtx.destination);
            source.start(0);
          } catch (e) {
            console.log("Welcome play error:", e);
          }
        }

        // Play pistol shot for button clicks
        playClick() {
          if (!this.clickLoaded || !this.audioCtx || !this.clickBuffer) {
            const audio = new Audio(this.clickUrl);
            audio.volume = 0.8;
            audio.play().catch(() => {});
            return;
          }

          try {
            if (this.audioCtx.state === "suspended") {
              this.audioCtx.resume();
            }
            const source = this.audioCtx.createBufferSource();
            source.buffer = this.clickBuffer;
            source.connect(this.audioCtx.destination);
            source.start(0);
          } catch (e) {
            console.log("Click play error:", e);
          }
        }

        // Method aliases for compatibility
        welcome() { this.playWelcome(); }
        startup() { this.playWelcome(); }
        roar() { this.playWelcome(); }
        snarl() { this.playWelcome(); }
        growl() { this.playWelcome(); }
        menace() { this.playWelcome(); }
        helicopter() { this.playWelcome(); }
        startGrowl() { this.playWelcome(); }
        deceleration() { this.playWelcome(); }
        yes() { this.playClick(); }
        gunshot() { this.playClick(); }
        click() { this.playClick(); }
      }

      const sport = new SportSound();
      
      // Preload audio files when page loads
      window.addEventListener("load", () => {
        sport.loadWelcomeAudio();
        sport.loadClickAudio();
      });
        yes() {
          this.init();
          const ctx = this.audioCtx;
          const now = ctx.currentTime;

          // Female voice "yes" - higher pitch, melodic
          // Fundamental frequency around 220Hz (A3)
          const fundamental = ctx.createOscillator();
          const gain = ctx.createGain();

          fundamental.type = "sine";
          fundamental.frequency.setValueAtTime(400, now);
          // Nice melodic rise and fall
          fundamental.frequency.linearRampToValueAtTime(500, now + 0.08);
          fundamental.frequency.linearRampToValueAtTime(450, now + 0.15);
          fundamental.frequency.linearRampToValueAtTime(380, now + 0.25);

          // Add harmonics for richness
          const harm2 = ctx.createOscillator();
          harm2.type = "sine";
          harm2.frequency.setValueAtTime(800, now);
          harm2.frequency.linearRampToValueAtTime(1000, now + 0.08);
          harm2.frequency.linearRampToValueAtTime(900, now + 0.15);
          harm2.frequency.linearRampToValueAtTime(760, now + 0.25);

          const harm3 = ctx.createOscillator();
          harm3.type = "sine";
          harm3.frequency.setValueAtTime(1200, now);
          harm3.frequency.linearRampToValueAtTime(1500, now + 0.08);
          harm3.frequency.linearRampToValueAtTime(1350, now + 0.25);

          // Envelope - soft attack, sustain, gentle release
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.25, now + 0.03);
          gain.gain.setValueAtTime(0.25, now + 0.15);
          gain.gain.linearRampToValueAtTime(0.15, now + 0.2);
          gain.gain.linearRampToValueAtTime(0, now + 0.3);

          const harm2Gain = ctx.createGain();
          harm2Gain.gain.value = 0.12;

          const harm3Gain = ctx.createGain();
          harm3Gain.gain.value = 0.05;

          // Soft filter for pleasant tone
          const filter = ctx.createBiquadFilter();
          filter.type = "lowpass";
          filter.frequency.value = 3000;

          fundamental.connect(filter);
          harm2.connect(harm2Gain);
          harm2Gain.connect(filter);
          harm3.connect(harm3Gain);
          harm3Gain.connect(filter);
          filter.connect(gain);
          gain.connect(ctx.destination);

          fundamental.start(now);
          harm2.start(now);
          harm3.start(now);

          fundamental.stop(now + 0.35);
          harm2.stop(now + 0.35);
          harm3.stop(now + 0.35);
        }

        // Female voice - Welcome greeting
        welcome() {
          this.init();
          const ctx = this.audioCtx;
          const now = ctx.currentTime;

          // Female voice "welcome" - warm and welcoming
          // "Wel-come" with two syllables

          // First syllable "Wel"
          const wel = ctx.createOscillator();
          const welGain = ctx.createGain();

          wel.type = "sine";
          wel.frequency.setValueAtTime(350, now);
          wel.frequency.linearRampToValueAtTime(400, now + 0.1);
          wel.frequency.linearRampToValueAtTime(380, now + 0.2);

          welGain.gain.setValueAtTime(0, now);
          welGain.gain.linearRampToValueAtTime(0.3, now + 0.02);
          welGain.gain.setValueAtTime(0.3, now + 0.15);
          welGain.gain.linearRampToValueAtTime(0.25, now + 0.2);

          // Second syllable "come"
          const come = ctx.createOscillator();
          const comeGain = ctx.createGain();

          come.type = "sine";
          come.frequency.setValueAtTime(380, now + 0.22);
          come.frequency.linearRampToValueAtTime(500, now + 0.32);
          come.frequency.linearRampToValueAtTime(450, now + 0.45);

          comeGain.gain.setValueAtTime(0, now + 0.22);
          comeGain.gain.linearRampToValueAtTime(0.35, now + 0.24);
          comeGain.gain.setValueAtTime(0.35, now + 0.38);
          comeGain.gain.linearRampToValueAtTime(0.2, now + 0.45);
          comeGain.gain.linearRampToValueAtTime(0, now + 0.55);

          // Harmonics for warmth
          const harm = ctx.createOscillator();
          const harmGain = ctx.createGain();

          harm.type = "sine";
          harm.frequency.setValueAtTime(700, now);
          harm.frequency.linearRampToValueAtTime(800, now + 0.1);
          harm.frequency.linearRampToValueAtTime(900, now + 0.35);
          harm.frequency.linearRampToValueAtTime(700, now + 0.5);

          harmGain.gain.setValueAtTime(0, now);
          harmGain.gain.linearRampToValueAtTime(0.1, now + 0.05);
          harmGain.gain.setValueAtTime(0.1, now + 0.4);
          harmGain.gain.linearRampToValueAtTime(0, now + 0.55);

          // Filter for soft tone
          const filter = ctx.createBiquadFilter();
          filter.type = "lowpass";
          filter.frequency.value = 2500;

          const mainGain = ctx.createGain();
          mainGain.gain.value = 1;

          wel.connect(welGain);
          come.connect(comeGain);
          harm.connect(harmGain);

          welGain.connect(filter);
          comeGain.connect(filter);
          harmGain.connect(filter);
          filter.connect(mainGain);
          mainGain.connect(ctx.destination);

          wel.start(now);
          come.start(now + 0.22);
          harm.start(now);

          wel.stop(now + 0.25);
          come.stop(now + 0.6);
          harm.stop(now + 0.6);
        }

        // Startup - Sport awakening
        // Helicopter rotor sound
        helicopter() {
          this.init();
          const ctx = this.audioCtx;
          const now = ctx.currentTime;
          const duration = 2;

          // Main rotor - rhythmic thump
          for (let i = 0; i < 8; i++) {
            const startTime = now + i * 0.25;

            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            const filter = ctx.createBiquadFilter();

            osc.type = "sawtooth";
            osc.frequency.setValueAtTime(80 + Math.random() * 20, startTime);
            osc.frequency.linearRampToValueAtTime(40, startTime + 0.2);

            filter.type = "lowpass";
            filter.frequency.value = 300;

            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.3, startTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.25);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);

            osc.start(startTime);
            osc.stop(startTime + 0.25);
          }

          // Whop-whop effect
          const whop = ctx.createOscillator();
          const whopGain = ctx.createGain();
          const whopFilter = ctx.createBiquadFilter();

          whop.type = "sawtooth";
          whop.frequency.setValueAtTime(200, now);
          whop.frequency.linearRampToValueAtTime(100, now + duration);

          whopFilter.type = "lowpass";
          whopFilter.frequency.value = 500;

          whopGain.gain.setValueAtTime(0.1, now);
          whopGain.gain.linearRampToValueAtTime(0.15, now + 0.5);
          whopGain.gain.linearRampToValueAtTime(0.05, now + duration);

          whop.connect(whopFilter);
          whopFilter.connect(whopGain);
          whopGain.connect(ctx.destination);

          whop.start(now);
          whop.stop(now + duration);
        }

        // Sustained growl for connecting
        startGrowl() {
          this.init();
          const ctx = this.audioCtx;
          const now = ctx.currentTime;

          const osc1 = ctx.createOscillator();
          const osc2 = ctx.createOscillator();

          osc1.type = "sawtooth";
          osc1.frequency.value = 80;

          osc2.type = "sawtooth";
          osc2.frequency.value = 120;

          const filter = ctx.createBiquadFilter();
          filter.type = "lowpass";
          filter.frequency.value = 300;

          const gain = ctx.createGain();
          gain.gain.value = 0.2;

          osc1.connect(filter);
          osc2.connect(filter);
          filter.connect(gain);
          gain.connect(ctx.destination);

          osc1.start(now);
          osc2.start(now);

          return {
            stop: () => {
              gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
              setTimeout(() => {
                try {
                  osc1.stop();
                  osc2.stop();
                } catch (e) {}
              }, 300);
            },
          };
        }

        // Deceleration growl
        deceleration() {
          this.growl();
          setTimeout(() => this.growl(), 150);
        }

        // Crackle replaced with snarl
        snarl() {
          this.init();
          const ctx = this.audioCtx;
          const now = ctx.currentTime;

          // Quick aggressive sound
          const osc = ctx.createOscillator();
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(300, now);
          osc.frequency.linearRampToValueAtTime(100, now + 0.1);

          const filter = ctx.createBiquadFilter();
          filter.type = "bandpass";
          filter.frequency.value = 400;
          filter.Q.value = 5;

          const gain = ctx.createGain();
          gain.gain.setValueAtTime(0.3, now);
          gain.gain.linearRampToValueAtTime(0, now + 0.15);

          osc.connect(filter);
          filter.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.15);
        }
      }

      // ==========================================
      // Splash Animation
      // ==========================================

      function runSplashAnimation() {
        const splash = document.getElementById("splash");
        const rpm1 = document.getElementById("rpm1");
        const rpm2 = document.getElementById("rpm2");
        const rpm3 = document.getElementById("rpm3");
        const rpm4 = document.getElementById("rpm4");
        const rpmBar = document.getElementById("rpmBar");
        const engineStatus = document.getElementById("engineStatus");
        const engineFlames = document.getElementById("engineFlames");

        let rpm = 0;
        const duration = 3500;
        const startTime = Date.now();

        // Start exhaust sound
        Sport.welcome();

        function animate() {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);

          // RPM simulation
          if (progress < 0.4) {
            rpm = progress * 25000; // 0 to 8000
          } else if (progress < 0.8) {
            rpm = 8000 + Math.sin(progress * 20) * 500; // Fluctuate
            if (Math.random() < 0.1) Sport.yes(0.5);
          } else {
            rpm = 7000 - (progress - 0.8) * 15000; // Drop to idle
          }

          // Update display
          const rpmStr = Math.floor(rpm).toString().padStart(4, "0");
          rpm1.textContent = rpmStr[0];
          rpm2.textContent = rpmStr[1];
          rpm3.textContent = rpmStr[2];
          rpm4.textContent = rpmStr[3];

          // Update bar
          rpmBar.style.width = `${(rpm / 8000) * 100}%`;

          // Update status
          if (progress < 0.3) {
            engineStatus.textContent = "SPORT AWAKENS";
          } else if (progress < 0.6) {
            engineStatus.textContent = "SPORT ROARS!";
            engineFlames.classList.add("active");
          } else if (progress < 0.9) {
            engineStatus.textContent = "SPORT SNARLS";
            Sport.deceleration();
          } else {
            engineStatus.textContent = "SPORT READY";
            engineFlames.classList.remove("active");
          }

          if (progress < 1) {
            requestAnimationFrame(animate);
          } else {
            Sport.yes(0.5);
            setTimeout(() => {
              splash.style.display = "none";
              checkAuthState();
            }, 600);
          }
        }

        // Initialize audio on first click
        document.addEventListener(
          "click",
          function initAudio() {
            Sport.init();
            document.removeEventListener("click", initAudio);
          },
          { once: true },
        );

        animate();
      }

      function checkAuthState() {
        const savedUser = localStorage.getItem("vpn_user");
        const savedToken = localStorage.getItem("vpn_token");

        if (savedUser && savedToken) {
          state.user = JSON.parse(savedUser);
          state.token = savedToken;
          showApp();
          renderServers();
          loadSavedServer();
        } else {
          showAuth();
        }
      }

      function showAuth() {
        document.getElementById("auth").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
      }

      function showApp() {
        document.getElementById("auth").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
      }

      function showToast(message, type = "info") {
        const toast = document.getElementById("toast");
        const toastText = document.getElementById("toastText");
        toastText.textContent = message;
        toast.className = `toast ${type}`;
        toast.style.display = "block";
        setTimeout(() => (toast.style.display = "none"), 3000);
      }

      function renderServers() {
        const container = document.getElementById("regionGroups");
        let html =
          '<h3 style="color: var(--sport-silver); margin-bottom: 1rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">🌍 SELECT SERVER</h3><ul class="server-list">';

        SERVERS.forEach((server) => {
          const selected =
            state.selectedServer?.id === server.id ? "selected" : "";
          const pingColor =
            server.ping < 50
              ? "#00aa00"
              : server.ping < 100
                ? "#ffd700"
                : "#ff4500";

          html += `<li class="server-item ${selected}" data-server-id="${server.id}">
                          <span class="server-flag">${server.flag}</span>
                          <div class="server-info">
                              <div class="server-name">${server.name}</div>
                              <div class="server-location">${server.location}</div>
                          </div>
                          <span class="server-ping" style="color: ${pingColor}">${server.ping}ms</span>
                      </li>`;
        });

        html += "</ul>";
        container.innerHTML = html;

        document.querySelectorAll(".server-item").forEach((item) => {
          item.addEventListener("click", () => {
            sport.click();
            const server = SERVERS.find((s) => s.id === item.dataset.serverId);
            selectServer(server);
          });
        });
      }

      function selectServer(server) {
        state.selectedServer = server;
        localStorage.setItem("vpn_server", JSON.stringify(server));
        document.getElementById("serverName").textContent =
          `${server.flag} ${server.name}`;
        document.getElementById("location").textContent = server.location;
        renderServers();
        showToast(`SERVER: ${server.name}`, "success");
      }

      function loadSavedServer() {
        const saved = localStorage.getItem("vpn_server");
        if (saved) {
          try {
            state.selectedServer = JSON.parse(saved);
            document.getElementById("serverName").textContent =
              `${state.selectedServer.flag} ${state.selectedServer.name}`;
            document.getElementById("location").textContent =
              state.selectedServer.location;
          } catch (e) {}
        }
      }

      async function connect() {
        if (!state.selectedServer) {
          sport.click();
          showToast("SELECT SERVER FIRST!", "error");
          return;
        }

        state.connecting = true;
        updateConnectionUI();

        // Start rev sound
        state.currentRev = Sport.yes(1);

        document.getElementById("statusIcon").textContent = "🔄";
        document.getElementById("statusText").textContent = "STARTING...";
        document.getElementById("statusSubtext").textContent =
          "Sport hunting...";

        try {
          await new Promise((resolve) => setTimeout(resolve, 2500));

          state.config = generateConfig(state.selectedServer, state.doubleVpn);
          state.connected = true;

          // Stop rev, add pops
          if (state.currentRev) {
            state.currentRev.stop();
            state.currentRev = null;
          }
          Sport.deceleration();
          setTimeout(() => Sport.yes(0.5), 200);

          document.getElementById("statusIcon").textContent = "🔥";
          document.getElementById("statusText").textContent = "RUNNING";
          document.getElementById("statusSubtext").textContent =
            "Sport is hunting!";
          document.getElementById("connectionInfo").style.display = "block";
          document.getElementById("ipAddress").textContent =
            state.config.address;

          const btn = document.getElementById("connectBtn");
          btn.textContent = "STOP SPORT";
          btn.className = "connect-btn connected";

          showToast(`CONNECTED TO ${state.selectedServer.name}!`, "success");
        } catch (error) {
          if (state.currentRev) {
            state.currentRev.stop();
            state.currentRev = null;
          }
          showToast("CONNECTION ERROR", "error");
          state.connected = false;
        } finally {
          state.connecting = false;
          updateConnectionUI();
        }
      }

      function disconnect() {
        state.connected = false;
        state.config = null;

        // Dramatic shutdown
        Sport.yes(1.2);
        setTimeout(() => {
          Sport.deceleration();
          if (state.currentRev) {
            state.currentRev.stop();
            state.currentRev = null;
          }
        }, 300);

        document.getElementById("statusIcon").textContent = "🔑";
        document.getElementById("statusText").textContent = "STOP";
        document.getElementById("statusSubtext").textContent =
          "Press to unleash Sport";
        document.getElementById("connectionInfo").style.display = "none";

        const btn = document.getElementById("connectBtn");
        btn.textContent = "AWAKEN SPORT";
        btn.className = "connect-btn";

        showToast("ENGINE STOPPED");
      }

      function updateConnectionUI() {
        const btn = document.getElementById("connectBtn");
        btn.disabled = state.connecting;
      }

      function generateConfig(server, doubleVpn) {
        return {
          text: `[Interface]
      PrivateKey = ${generateKey()}
      Address = 10.0.0.2/32
      DNS = 1.1.1.1

      [Peer]
      PublicKey = SERVER_KEY
      Endpoint = vpn.venomvpn.com:51820
      AllowedIPs = 0.0.0.0/0
      PersistentKeepalive = 25
      `,
          address: "10.0.0.2",
          server: server.name,
        };
      }

      function generateKey() {
        const chars =
          "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
        return Array.from(
          { length: 43 },
          () => chars[Math.floor(Math.random() * chars.length)],
        ).join("");
      }

      function downloadConfig() {
        sport.click();
        if (!state.config) {
          showToast("CONNECT FIRST!", "error");
          return;
        }

        const blob = new Blob([state.config.text], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `venom-vpn-${state.selectedServer.id}.conf`;
        a.click();
        URL.revokeObjectURL(url);

        Sport.yes(0.5);
        showToast("CONFIG DOWNLOADED!", "success");
      }

      function authenticate() {
        try {
          sport.click();
        } catch (e) {}

        state.user = { username: "SPORT_DRIVER", id: Date.now() };
        state.token = "token_" + Date.now();
        localStorage.setItem("vpn_user", JSON.stringify(state.user));
        localStorage.setItem("vpn_token", state.token);

        try {
          setTimeout(() => Sport.yes(0.5), 200);
        } catch (e) {}

        showApp();
        renderServers();
        loadSavedServer();
        showToast("WELCOME, DRIVER!", "success");
      }

      function showServersModal() {
        sport.click();

        let html =
          '<h3 class="modal-title">🌍 ALL SERVERS</h3><ul class="server-list">';

        SERVERS.forEach((server) => {
          const selected =
            state.selectedServer?.id === server.id ? "selected" : "";
          html += `<li class="server-item ${selected}" data-server-id="${server.id}">
                          <span class="server-flag">${server.flag}</span>
                          <div class="server-info">
                              <div class="server-name">${server.name}</div>
                              <div class="server-location">${server.location}</div>
                          </div>
                          <span class="server-ping">${server.ping}ms</span>
                      </li>`;
        });

        html += "</ul>";

        document.getElementById("modalBody").innerHTML = html;
        document.getElementById("modal").classList.remove("hidden");

        document.querySelectorAll("#modalBody .server-item").forEach((item) => {
          item.addEventListener("click", () => {
            sport.click();
            const server = SERVERS.find((s) => s.id === item.dataset.serverId);
            selectServer(server);
            closeModal();
          });
        });
      }

      function showHelpModal() {
        sport.click();

        document.getElementById("modalBody").innerHTML = `
                      <h3 class="modal-title">❓ MANUAL</h3>
                      <div style="color: var(--text-secondary); line-height: 2;">
                          <p><strong style="color: var(--sport-silver);">HOW TO CONNECT?</strong></p>
                          <ol style="margin: 0.5rem 0; padding-left: 1.5rem;">
                              <li>Select server</li>
                              <li>Enable Double VPN</li>
                              <li>Press AWAKEN SPORT</li>
                              <li>Download config</li>
                          </ol>
                          <p style="margin-top: 1rem;"><strong style="color: var(--sport-silver);">SUPPORT:</strong></p>
                          <p>@SportpowerVPN_bot</p>
                      </div>
                  `;
        document.getElementById("modal").classList.remove("hidden");
      }

      function showProfileModal() {
        sport.click();

        document.getElementById("modalBody").innerHTML = `
                      <h3 class="modal-title">👤 PROFILE</h3>
                      <div class="profile-section">
                          <div class="profile-avatar">AMG</div>
                          <div class="profile-name">${state.user?.username || "GUEST"}</div>
                          <div class="profile-username">@venom_vpn</div>
                          <div style="margin-top: 1rem;">
                              <span class="card-badge active">AMG EDITION</span>
                          </div>
                      </div>
                      <div class="profile-stats">
                          <div class="stat-item">
                              <div class="stat-value">${SERVERS.length}</div>
                              <div class="stat-label">SERVERS</div>
                          </div>
                          <div class="stat-item">
                              <div class="stat-value">20+</div>
                              <div class="stat-label">COUNTRIES</div>
                          </div>
                      </div>
                  `;
        document.getElementById("modal").classList.remove("hidden");
      }

      function closeModal() {
        document.getElementById("modal").classList.add("hidden");
      }

      // ==========================================
      // Event Listeners
      // ==========================================

      function setupEventListeners() {
        const telegramBtn = document.getElementById("telegramAuth");
        if (telegramBtn) {
          telegramBtn.addEventListener("click", authenticate);
        }

        const connectBtn = document.getElementById("connectBtn");
        if (connectBtn) {
          connectBtn.addEventListener("click", () => {
            if (state.connected) disconnect();
            else connect();
          });
        }

        const doubleVpnCheckbox = document.getElementById("doubleVpnCheckbox");
        if (doubleVpnCheckbox) {
          doubleVpnCheckbox.addEventListener("change", (e) => {
            try {
              sport.click();
            } catch (err) {}
            state.doubleVpn = e.target.checked;
            localStorage.setItem("double_vpn", state.doubleVpn);
            showToast(state.doubleVpn ? "🔥 DOUBLE VPN ON" : "DOUBLE VPN OFF");
            if (state.doubleVpn) {
              setTimeout(() => {
                try {
                  Sport.yes();
                } catch (err) {}
              }, 200);
            }
          });
        }

        const serversBtn = document.getElementById("serversBtn");
        if (serversBtn) serversBtn.addEventListener("click", showServersModal);

        document.querySelectorAll('[data-tab="servers"]').forEach((btn) => {
          btn.addEventListener("click", showServersModal);
        });

        const helpBtn = document.getElementById("helpBtn");
        if (helpBtn) helpBtn.addEventListener("click", showHelpModal);

        const profileBtn = document.getElementById("profileBtn");
        if (profileBtn) profileBtn.addEventListener("click", showProfileModal);

        const configBtn = document.getElementById("configBtn");
        if (configBtn) configBtn.addEventListener("click", downloadConfig);

        const modalCloseBtn = document.getElementById("modalCloseBtn");
        if (modalCloseBtn) modalCloseBtn.addEventListener("click", closeModal);

        const modal = document.getElementById("modal");
        if (modal) {
          modal.addEventListener("click", (e) => {
            if (e.target === modal) closeModal();
          });
        }

        document.querySelectorAll(".nav-item").forEach((item) => {
          item.addEventListener("click", () => {
            try {
              sport.click();
            } catch (err) {}
            document
              .querySelectorAll(".nav-item")
              .forEach((i) => i.classList.remove("active"));
            item.classList.add("active");

            const tab = item.dataset.tab;
            if (tab === "servers") showServersModal();
            if (tab === "profile") showProfileModal();
          });
        });
      }

      // Initialize
      window.addEventListener("load", () => {
        runSplashAnimation();
        setupEventListeners();
      });

      // Also setup immediately in case DOM is already ready
      if (
        document.readyState === "complete" ||
        document.readyState === "interactive"
      ) {
        setupEventListeners();
      }
    </script>
  </body>
</html>
