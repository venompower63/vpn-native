<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="Venom VPN">
    <title>Venom VPN</title>
    <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body style="background: #0a0a14; margin: 0; padding: 0;">
    
    <!-- Auth Screen (visible by default) -->
    <div id="auth" class="auth-screen" style="display: flex;">
        <div class="auth-content">
            <div class="auth-logo">
                <img src="https://storage.yandexcloud.net/promto-user-static-sites-prod/design-assets/941619812/6bb7db79-ec84-41c7-b74f-db5bb596911a/67183a73-f3d0-4b86-8ab6-4d1569df816c-Venom_25921-2944282668.jpg" 
                     alt="Venom" style="width: 120px; border-radius: 20px; margin-bottom: 1rem;">
            </div>
            <h1>Venom VPN</h1>
            <p class="auth-desc">Безопасное и быстрое VPN-подключение</p>
            <button class="telegram-btn" id="telegramAuth">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
                </svg>
                <span>Войти через Telegram</span>
            </button>
            <p class="auth-hint">Нажмите кнопку выше для авторизации</p>
        </div>
    </div>

    <!-- Main App (hidden by default) -->
    <div id="app" class="app" style="display: none;">
        <header class="header">
            <div class="header-left">
                <img src="https://storage.yandexcloud.net/promto-user-static-sites-prod/design-assets/941619812/6bb7db79-ec84-41c7-b74f-db5bb596911a/67183a73-f3d0-4b86-8ab6-4d1569df816c-Venom_25921-2944282668.jpg" 
                     alt="Logo" style="width: 32px; height: 32px; border-radius: 8px;">
                <span class="app-name">Venom VPN</span>
            </div>
            <div class="header-right">
                <button id="profileBtn" class="icon-btn">👤</button>
            </div>
        </header>

        <main class="main">
            <div class="status-card" id="statusCard">
                <div class="status-indicator" id="statusIndicator">
                    <div class="status-ring"></div>
                    <div class="status-icon">🔓</div>
                </div>
                <h2 class="status-text" id="statusText">Отключено</h2>
                <p class="status-subtext" id="statusSubtext">Нажмите для подключения</p>
                <div class="connection-info" id="connectionInfo" style="display: none;">
                    <div class="info-row">
                        <span class="info-label">IP</span>
                        <span class="info-value" id="ipAddress">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Локация</span>
                        <span class="info-value" id="location">—</span>
                    </div>
                </div>
                <button class="connect-btn" id="connectBtn">Подключить</button>
            </div>

            <div class="subscription-card">
                <div class="card-header">
                    <span class="card-title">Подписка</span>
                    <span class="card-badge active" id="subBadge">Активна</span>
                </div>
                <div class="sub-info">
                    <span class="sub-plan" id="subPlan">Оптимум</span>
                    <span class="sub-expiry" id="subExpiry">До 14.07.2026</span>
                </div>
                <div class="sub-progress">
                    <div class="progress-bar" style="width: 17%"></div>
                </div>
                <p class="sub-days" id="subDays">30 дней осталось</p>
            </div>

            <div class="actions-grid">
                <button class="action-btn" id="serverBtn">
                    <span class="action-icon">🌐</span>
                    <span class="action-text">Сервер</span>
                </button>
                <button class="action-btn" id="configBtn">
                    <span class="action-icon">📥</span>
                    <span class="action-text">Конфиг</span>
                </button>
                <button class="action-btn" id="helpBtn">
                    <span class="action-icon">❓</span>
                    <span class="action-text">Помощь</span>
                </button>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active">🏠<span>Главная</span></button>
            <button class="nav-item">⚙️<span>Настройки</span></button>
            <button class="nav-item">👤<span>Профиль</span></button>
        </nav>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // Simple app state
        var connected = false;
        
        // DOM elements
        var authScreen = document.getElementById('auth');
        var appScreen = document.getElementById('app');
        var modal = document.getElementById('modal');
        var modalBody = document.getElementById('modalBody');
        var statusText = document.getElementById('statusText');
        var statusSubtext = document.getElementById('statusSubtext');
        var statusIcon = document.querySelector('.status-icon');
        var connectBtn = document.getElementById('connectBtn');
        var connectionInfo = document.getElementById('connectionInfo');
        var ipAddress = document.getElementById('ipAddress');
        var locationEl = document.getElementById('location');

        // Telegram auth
        document.getElementById('telegramAuth').addEventListener('click', function() {
            // Simple demo login
            authScreen.style.display = 'none';
            appScreen.style.display = 'flex';
        });

        // Connect button
        connectBtn.addEventListener('click', function() {
            if (connected) {
                disconnect();
            } else {
                connect();
            }
        });

        function connect() {
            statusText.textContent = 'Подключение...';
            statusSubtext.textContent = 'Пожалуйста, подождите';
            connectBtn.textContent = '...';
            connectBtn.disabled = true;
            
            setTimeout(function() {
                connected = true;
                statusText.textContent = 'Подключено';
                statusSubtext.textContent = 'Ваше соединение защищено';
                statusIcon.textContent = '🔒';
                connectBtn.textContent = 'Отключить';
                connectBtn.disabled = false;
                connectionInfo.style.display = 'block';
                ipAddress.textContent = '10.0.0.2';
                locationEl.textContent = '🇩🇪 Frankfurt';
            }, 1500);
        }

        function disconnect() {
            connected = false;
            statusText.textContent = 'Отключено';
            statusSubtext.textContent = 'Нажмите для подключения';
            statusIcon.textContent = '🔓';
            connectBtn.textContent = 'Подключить';
            connectionInfo.style.display = 'none';
        }

        // Server button
        document.getElementById('serverBtn').addEventListener('click', function() {
            modalBody.innerHTML = '<h3>Выбор сервера</h3><ul class="server-list">' +
                '<li class="server-item" onclick="selectServer(this)">🇩🇪 Germany - Frankfurt</li>' +
                '<li class="server-item" onclick="selectServer(this)">🇳🇱 Netherlands - Amsterdam</li>' +
                '<li class="server-item" onclick="selectServer(this)">🇺🇸 USA - New York</li>' +
                '<li class="server-item" onclick="selectServer(this)">🇷🇺 Russia - Moscow</li>' +
                '</ul>';
            modal.style.display = 'flex';
        });

        function selectServer(el) {
            modal.style.display = 'none';
            var server = el.textContent;
            alert('Сервер: ' + server);
        }

        // Config button
        document.getElementById('configBtn').addEventListener('click', function() {
            modalBody.innerHTML = '<h3>Скачать конфиг</h3><p>Нажмите кнопку ниже для скачивания WireGuard конфига</p><button class="connect-btn" onclick="downloadConfig()">Скачать</button>';
            modal.style.display = 'flex';
        });

        function downloadConfig() {
            var config = '[Interface]\nPrivateKey = demo_key\nAddress = 10.0.0.2/32\nDNS = 1.1.1.1\n\n[Peer]\nPublicKey = server_key\nEndpoint = vpn.example.com:51820\nAllowedIPs = 0.0.0.0/0\nPersistentKeepalive = 25';
            var blob = new Blob([config], {type: 'text/plain'});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'venom-vpn.conf';
            a.click();
            modal.style.display = 'none';
        }

        // Help button
        document.getElementById('helpBtn').addEventListener('click', function() {
            modalBody.innerHTML = '<h3>Помощь</h3><p><strong>Как подключиться?</strong></p><p>1. Нажмите "Подключить"<br>2. Скачайте конфиг<br>3. Импортируйте в WireGuard</p><p><strong>Проблемы?</strong></p><p>@VenompowerVPN_bot</p>';
            modal.style.display = 'flex';
        });

        // Profile button
        document.getElementById('profileBtn').addEventListener('click', function() {
            modalBody.innerHTML = '<h3>Профиль</h3><div style="text-align: center;"><img src="https://storage.yandexcloud.net/promto-user-static-sites-prod/design-assets/941619812/6bb7db79-ec84-41c7-b74f-db5bb596911a/67183a73-f3d0-4b86-8ab6-4d1569df816c-Venom_25921-2944282668.jpg" style="width: 80px; border-radius: 50%;"><p><strong>Demo User</strong></p><p>@demo_user</p></div>';
            modal.style.display = 'flex';
        });

        function closeModal() {
            modal.style.display = 'none';
        }

        // Close modal on background click
        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeModal();
        });
    </script>
</body>
</html>
