<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN App Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #0a0a14;
            color: white;
        }
        .container { text-align: center; }
        h1 { color: #00d9ff; }
        .status { margin: 20px 0; padding: 20px; background: #12121f; border-radius: 10px; }
        button {
            background: linear-gradient(135deg, #00d9ff, #7b2fff);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }
        .log {
            margin-top: 20px;
            text-align: left;
            background: #000;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-item { margin: 2px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VPN App Test</h1>
        <div class="status" id="status">Loading...</div>
        <button onclick="testApp()">Test App</button>
        <button onclick="showAuth()">Show Auth</button>
        <button onclick="showMain()">Show Main</button>
        <div class="log" id="log"></div>
    </div>
    
    <script>
        function log(msg) {
            const logDiv = document.getElementById('log');
            const item = document.createElement('div');
            item.className = 'log-item';
            item.textContent = new Date().toLocaleTimeString() + ': ' + msg;
            logDiv.appendChild(item);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }
        
        function testApp() {
            log('Test button clicked');
            document.getElementById('status').textContent = 'App is working!';
        }
        
        function showAuth() {
            log('Showing auth screen');
            document.getElementById('status').innerHTML = '<h2>Auth Screen</h2><button onclick="simulateLogin()">Login with Telegram</button>';
        }
        
        function showMain() {
            log('Showing main screen');
            document.getElementById('status').innerHTML = '<h2>Main Screen</h2><p>VPN Status: Disconnected</p><button onclick="testApp()">Connect</button>';
        }
        
        function simulateLogin() {
            log('Simulating login');
            showMain();
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            log('DOM loaded');
            document.getElementById('status').textContent = 'Ready - Tap a button';
        });
        
        log('Script loaded');
    </script>
</body>
</html>
