    <!-- ============================================
         ENGINE SOUND AUDIO
         ============================================ -->
    <script>
        // Engine Sound Synthesis using Web Audio API
        class EngineSound {
            constructor() {
                this.audioCtx = null;
                this.oscillators = [];
                this.gainNodes = [];
                this.isPlaying = false;
            }

            init() {
                if (this.audioCtx) return;
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            start(rpm = 1000) {
                this.init();
                if (this.isPlaying) return;
                this.isPlaying = true;

                // Create multiple oscillators for engine sound
                const frequencies = [80, 160, 240, 320];
                const volumes = [0.3, 0.2, 0.1, 0.05];

                frequencies.forEach((baseFreq, i) => {
                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    const filter = this.audioCtx.createBiquadFilter();

                    osc.type = 'sawtooth';
                    osc.frequency.value = baseFreq + (rpm / 100);
                    
                    filter.type = 'lowpass';
                    filter.frequency.value = 500 + rpm;
                    filter.Q.value = 1;

                    gain.gain.value = volumes[i] * (rpm / 2000);

                    osc.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.audioCtx.destination);

                    osc.start();
                    this.oscillators.push(osc);
                    this.gainNodes.push(gain);
                });
            }

            rev(rpm = 5000) {
                if (!this.isPlaying) this.start(1000);
                
                this.oscillators.forEach((osc, i) => {
                    const baseFreq = [80, 160, 240, 320][i];
                    osc.frequency.setTargetAtTime(baseFreq + (rpm / 50), this.audioCtx.currentTime, 0.1);
                });

                this.gainNodes.forEach((gain, i) => {
                    const baseVol = [0.3, 0.2, 0.1, 0.05][i];
                    gain.gain.setTargetAtTime(baseVol * (rpm / 4000), this.audioCtx.currentTime, 0.1);
                });
            }

            stop() {
                if (!this.isPlaying) return;
                this.isPlaying = false;

                this.oscillators.forEach(osc => {
                    try { osc.stop(); } catch(e) {}
                });
                this.oscillators = [];
                this.gainNodes = [];
            }
        }

        const engineSound = new EngineSound();

        // ==========================================
        // Venom VPN - Configuration
        // ==========================================
        
        const CONFIG = {
            API_URL: 'https://api.venomvpn.com/api/v1',
            APP_NAME: 'Venom VPN',
            WG_PORT: 51820,
        };
        
        const SERVERS = [
            { id: 'us-east-1', name: 'US EAST', location: 'Virginia, USA', country: 'us', flag: '🇺🇸', ping: 45 },
            { id: 'us-west-1', name: 'US WEST', location: 'California, USA', country: 'us', flag: '🇺🇸', ping: 78 },
            { id: 'sa-east-1', name: 'BRAZIL', location: 'São Paulo', country: 'br', flag: '🇧🇷', ping: 120 },
            { id: 'eu-central-1', name: 'GERMANY', location: 'Frankfurt', country: 'de', flag: '🇩🇪', ping: 25 },
            { id: 'eu-west-1', name: 'IRELAND', location: 'Dublin', country: 'ie', flag: '🇮🇪', ping: 30 },
            { id: 'eu-west-2', name: 'UK', location: 'London', country: 'uk', flag: '🇬🇧', ping: 35 },
            { id: 'ap-northeast-1', name: 'JAPAN', location: 'Tokyo', country: 'jp', flag: '🇯🇵', ping: 120 },
            { id: 'ap-southeast-1', name: 'SINGAPORE', location: 'Singapore', country: 'sg', flag: '🇸🇬', ping: 100 },
            { id: 'ap-south-1', name: 'INDIA', location: 'Mumbai', country: 'in', flag: '🇮🇳', ping: 90 },
            { id: 'me-central-1', name: 'UAE', location: 'Dubai', country: 'ae', flag: '🇦🇪', ping: 85 },
        ];
        
        const state = {
            connected: false,
            connecting: false,
            selectedServer: null,
            doubleVpn: false,
            user: null,
            token: null,
            config: null,
        };
        
        // ==========================================
        // Splash Screen Animation
        // ==========================================
        
        function runSplashAnimation() {
            const splash = document.getElementById('splash');
            const needle = document.getElementById('needle');
            const gaugeFill = document.getElementById('gaugeFill');
            const engineStatus = document.getElementById('engineStatus');
            const loadingBar = document.getElementById('loadingBar');
            
            // Timeline
            let progress = 0;
            const duration = 4000;
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                progress = Math.min(elapsed / duration, 1);
                
                // RPM simulation: 0 -> 6000 -> 3000 (idle)
                let rpm;
                if (progress < 0.3) {
                    rpm = progress * 20000; // 0 to 6000
                } else if (progress < 0.7) {
                    rpm = 6000; // Hold at 6000
                    engineSound.rev(6000);
                } else {
                    rpm = 6000 - ((progress - 0.7) * 10000); // 6000 to 3000
                    engineSound.rev(3000);
                }
                
                // Update gauge
                const rotation = -90 + (rpm / 8000) * 180;
                needle.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
                gaugeFill.style.height = `${(rpm / 8000) * 100}%`;
                
                // Update status text
                if (progress < 0.3) {
                    engineStatus.textContent = 'STARTING ENGINE...';
                } else if (progress < 0.7) {
                    engineStatus.textContent = 'HIGH RPM!';
                } else {
                    engineStatus.textContent = 'IDLE';
                }
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // Animation complete
                    engineSound.stop();
                    setTimeout(() => {
                        splash.style.display = 'none';
                        checkAuthState();
                    }, 500);
                }
            }
            
            // Start engine sound on first user interaction
            document.addEventListener('click', function initSound() {
                engineSound.start(1000);
                document.removeEventListener('click', initSound);
            }, { once: true });
            
            animate();
        }
        
        // ==========================================
        // App Logic
        // ==========================================
        
        function checkAuthState() {
            const savedUser = localStorage.getItem('vpn_user');
            const savedToken = localStorage.getItem('vpn_token');
            
            if (savedUser && savedToken) {
                state.user = JSON.parse(savedUser);
                state.token = savedToken;
                showApp();
                renderServers();
                loadSavedServer();
            } else {
                showAuth();
            }
        }
        
        function showAuth() {
            document.getElementById('auth').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }
        
        function showApp() {
            document.getElementById('auth').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        function renderServers() {
            const container = document.getElementById('regionGroups');
            let html = '<ul class="server-list">';
            
            SERVERS.forEach(server => {
                const selected = state.selectedServer?.id === server.id ? 'selected' : '';
                const pingColor = server.ping < 50 ? '#00ff00' : server.ping < 100 ? '#ffd700' : '#ff6b00';
                
                html += `<li class="server-item ${selected}" data-server-id="${server.id}">
                    <span class="server-flag">${server.flag}</span>
                    <div class="server-info">
                        <div class="server-name">${server.name}</div>
                        <div class="server-location">${server.location}</div>
                    </div>
                    <span class="server-ping" style="color: ${pingColor}">${server.ping}ms</span>
                </li>`;
            });
            
            html += '</ul>';
            container.innerHTML = html;
            
            // Add click handlers
            document.querySelectorAll('.server-item').forEach(item => {
                item.addEventListener('click', () => {
                    const server = SERVERS.find(s => s.id === item.dataset.serverId);
                    selectServer(server);
                    engineSound.rev(4000);
                    setTimeout(() => engineSound.rev(2000), 500);
                });
            });
        }
        
        function selectServer(server) {
            state.selectedServer = server;
            localStorage.setItem('vpn_server', JSON.stringify(server));
            document.getElementById('serverName').textContent = `${server.flag} ${server.name}`;
            document.getElementById('location').textContent = server.location;
            renderServers();
            showToast(`СЕРВЕР: ${server.name}`, 'success');
        }
        
        function loadSavedServer() {
            const saved = localStorage.getItem('vpn_server');
            if (saved) {
                try {
                    state.selectedServer = JSON.parse(saved);
                    document.getElementById('serverName').textContent = `${state.selectedServer.flag} ${state.selectedServer.name}`;
                    document.getElementById('location').textContent = state.selectedServer.location;
                } catch (e) {}
            }
        }
        
        async function connect() {
            if (!state.selectedServer) {
                showToast('ВЫБЕРИТЕ СЕРВЕР!', 'error');
                return;
            }
            
            state.connecting = true;
            updateConnectionUI();
            
            // Engine rev up
            engineSound.rev(7000);
            
            // Update UI to connecting state
            document.getElementById('statusIcon').textContent = '🔄';
            document.getElementById('statusText').textContent = 'ЗАПУСК...';
            document.getElementById('statusSubtext').textContent = 'Подключение к серверу...';
            
            try {
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                state.config = generateWireGuardConfig(state.selectedServer, state.doubleVpn);
                state.connected = true;
                
                // Engine idle
                engineSound.rev(2000);
                
                document.getElementById('statusIcon').textContent = '🔥';
                document.getElementById('statusText').textContent = 'ЗАПУЩЕН';
                document.getElementById('statusSubtext').textContent = 'Двигатель работает!';
                document.getElementById('connectionInfo').style.display = 'block';
                document.getElementById('ipAddress').textContent = state.config.address;
                
                const btn = document.getElementById('connectBtn');
                btn.textContent = 'ОСТАНОВИТЬ ДВИГАТЕЛЬ';
                btn.className = 'connect-btn connected';
                
                showToast(`ПОДКЛЮЧЕНО К ${state.selectedServer.name}!`, 'success');
                
            } catch (error) {
                engineSound.stop();
                showToast('ОШИБКА ПОДКЛЮЧЕНИЯ', 'error');
                state.connected = false;
            } finally {
                state.connecting = false;
                updateConnectionUI();
            }
        }
        
        function disconnect() {
            state.connected = false;
            state.config = null;
            
            engineSound.rev(5000);
            setTimeout(() => engineSound.stop(), 1000);
            
            document.getElementById('statusIcon').textContent = '🔓';
            document.getElementById('statusText').textContent = 'СТОП';
            document.getElementById('statusSubtext').textContent = 'Нажмите для запуска';
            document.getElementById('connectionInfo').style.display = 'none';
            
            const btn = document.getElementById('connectBtn');
            btn.textContent = 'ЗАПУСК ДВИГАТЕЛЯ';
            btn.className = 'connect-btn';
            
            showToast('ДВИГАТЕЛЬ ОСТАНОВЛЕН');
        }
        
        function updateConnectionUI() {
            const btn = document.getElementById('connectBtn');
            if (state.connecting) {
                btn.disabled = true;
            } else {
                btn.disabled = false;
            }
        }
        
        function generateWireGuardConfig(server, doubleVpn = false) {
            const privateKey = generateRandomKey();
            
            let config = `[Interface]
PrivateKey = ${privateKey}
Address = 10.0.0.2/32
DNS = 1.1.1.1

[Peer]
PublicKey = SERVER_PUBLIC_KEY
Endpoint = vpn.venomvpn.com:${CONFIG.WG_PORT}
AllowedIPs = 0.0.0.0/0
PersistentKeepalive = 25
`;
            
            if (doubleVpn) {
                config += `
# Double VPN - Second Hop
[Peer]
PublicKey = SECOND_HOP_KEY
Endpoint = second.vpn.venomvpn.com:${CONFIG.WG_PORT}
AllowedIPs = 0.0.0.0/0
`;
            }
            
            return { text: config, address: '10.0.0.2', server: server.name };
        }
        
        function generateRandomKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
            let key = '';
            for (let i = 0; i < 43; i++) key += chars.charAt(Math.floor(Math.random() * chars.length));
            return key;
        }
        
        function downloadConfig() {
            if (!state.config) {
                showToast('СНАЧАЛА ПОДКЛЮЧИТЕСЬ!', 'error');
                return;
            }
            
            const blob = new Blob([state.config.text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `venom-vpn-${state.selectedServer.id}.conf`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('КОНФИГ СКАЧАН!', 'success');
        }
        
        function authenticate() {
            state.user = { username: 'RACER', id: Date.now() };
            state.token = 'token_' + Date.now();
            localStorage.setItem('vpn_user', JSON.stringify(state.user));
            localStorage.setItem('vpn_token', state.token);
            
            engineSound.rev(6000);
            setTimeout(() => engineSound.rev(2500), 800);
            
            showApp();
            renderServers();
            loadSavedServer();
            showToast('ДОБРО ПОЖАЛОВАТЬ, РЕЙСЕР!', 'success');
        }
        
        function showServersModal() {
            let html = '<h3 class="modal-title">🌍 ВСЕ СЕРВЕРЫ</h3><ul class="server-list">';
            
            SERVERS.forEach(server => {
                const selected = state.selectedServer?.id === server.id ? 'selected' : '';
                html += `<li class="server-item ${selected}" data-server-id="${server.id}">
                    <span class="server-flag">${server.flag}</span>
                    <div class="server-info">
                        <div class="server-name">${server.name}</div>
                        <div class="server-location">${server.location}</div>
                    </div>
                    <span class="server-ping">${server.ping}ms</span>
                </li>`;
            });
            
            html += '</ul>';
            
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modal').classList.remove('hidden');
            
            document.querySelectorAll('#modalBody .server-item').forEach(item => {
                item.addEventListener('click', () => {
                    const server = SERVERS.find(s => s.id === item.dataset.serverId);
                    selectServer(server);
                    closeModal();
                });
            });
        }
        
        function showHelpModal() {
            document.getElementById('modalBody').innerHTML = `
                <h3 class="modal-title">❓ ПАСПОРТ</h3>
                <div style="color: var(--text-secondary); line-height: 2;">
                    <p><strong style="color: var(--lambo-orange);">КАК ПОДКЛЮЧИТЬСЯ?</strong></p>
                    <ol style="margin: 0.5rem 0; padding-left: 1.5rem;">
                        <li>Выберите сервер</li>
                        <li>Включите Double VPN</li>
                        <li>Нажмите ЗАПУСК</li>
                        <li>Скачайте конфиг</li>
                    </ol>
                    <p style="margin-top: 1rem;"><strong style="color: var(--lambo-orange);">ПОДДЕРЖКА:</strong></p>
                    <p>@VenompowerVPN_bot</p>
                </div>
            `;
            document.getElementById('modal').classList.remove('hidden');
        }
        
        function showProfileModal() {
            document.getElementById('modalBody').innerHTML = `
                <h3 class="modal-title">👤 ПРОФИЛЬ</h3>
                <div class="profile-section">
                    <div class="profile-avatar">🐂</div>
                    <div class="profile-name">${state.user?.username || 'GUEST'}</div>
                    <div class="profile-username">@venom_vpn</div>
                    <div style="margin-top: 1rem;">
                        <span class="card-badge active">LAMBORGHINI EDITION</span>
                    </div>
                </div>
                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value">${SERVERS.length}</div>
                        <div class="stat-label">СЕРВЕРОВ</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">20+</div>
                        <div class="stat-label">СТРАН</div>
                    </div>
                </div>
            `;
            document.getElementById('modal').classList.remove('hidden');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
        
        // ==========================================
        // Event Listeners
        // ==========================================
        
        document.getElementById('telegramAuth').addEventListener('click', authenticate);
        
        document.getElementById('connectBtn').addEventListener('click', () => {
            if (state.connected) disconnect();
            else connect();
        });
        
        document.getElementById('doubleVpnCheckbox').addEventListener('change', (e) => {
            state.doubleVpn = e.target.checked;
            localStorage.setItem('double_vpn', state.doubleVpn);
            showToast(state.doubleVpn ? '🔥 DOUBLE VPN ВКЛ' : 'DOUBLE VPN ВЫКЛ');
            if (state.doubleVpn) {
                engineSound.rev(5000);
                setTimeout(() => engineSound.rev(2500), 600);
            }
        });
        
        document.getElementById('serversBtn').addEventListener('click', showServersModal);
        document.querySelectorAll('[data-tab="servers"]').forEach(btn => {
            btn.addEventListener('click', showServersModal);
        });
        document.getElementById('helpBtn').addEventListener('click', showHelpModal);
        document.getElementById('profileBtn').addEventListener('click', showProfileModal);
        document.getElementById('configBtn').addEventListener('click', downloadConfig);
        
        document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                
                const tab = item.dataset.tab;
                if (tab === 'servers') showServersModal();
                if (tab === 'profile') showProfileModal();
            });
        });
        
        // ==========================================
        // Initialize
        // ==========================================
        
        window.addEventListener('load', () => {
            runSplashAnimation();
        });
    </script>
</body>
</html>
